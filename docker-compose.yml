version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: netflify_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: twitter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: netflify_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/twitter
      - PORT=5000
    depends_on:
      - db

volumes:
  pgdata:
